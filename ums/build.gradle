// ================================================================
// ums/build.gradle
// Spring Boot 4.0.5  |  Gradle 9.4.1  |  JDK 25
// ================================================================

plugins {
    // Spring Boot 4 Gradle plugin — requires Gradle 8.14+ or 9.x
    id 'org.springframework.boot'           version '4.0.5'
    // Dependency management plugin brings BOM support (omit versions
    // for managed deps).  Latest stable: 1.1.7
    id 'io.spring.dependency-management'    version '1.1.7'
    id 'java'
}

// ---------------------------------------------------------------------------
// Project coordinates
// ---------------------------------------------------------------------------
group   = 'com.ziminpro.ums'
version = '2.0'

// ---------------------------------------------------------------------------
// Java toolchain — pins the exact JDK release used for compilation,
// javadoc, and test execution regardless of what JAVA_HOME points at.
// ---------------------------------------------------------------------------
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
        vendor          = JvmVendorSpec.ORACLE
    }
}

// ---------------------------------------------------------------------------
// Repositories
// ---------------------------------------------------------------------------
repositories {
    mavenCentral()
    // Milestone / snapshot repos needed only if you consume pre-release
    // Spring artifacts.  Keep them in case you want to test RC builds.
    maven { url 'https://repo.spring.io/milestone' }
    maven { url 'https://repo.spring.io/snapshot' }
}

// ---------------------------------------------------------------------------
// Dependencies
//
// Spring Boot 4 note: starters have been modularised.
//   • spring-boot-starter-webflux  — unchanged name, still reactive/Netty
//   • spring-boot-starter-jdbc     — unchanged name
//   • spring-boot-starter-test     — unchanged name (test slice)
//
// MySQL connector:
//   Old (Boot ≤ 2.x):  mysql:mysql-connector-java
//   New (Boot 3+/4):   com.mysql:mysql-connector-j   ← no version needed,
//                      managed by the Spring Boot BOM
//
// Lombok: annotation processor wiring is unchanged in Gradle 9.
// ---------------------------------------------------------------------------
configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

dependencies {
    // --- Web (reactive) ---
    implementation 'org.springframework.boot:spring-boot-starter-webflux'

    // --- Database ---
    implementation 'org.springframework.boot:spring-boot-starter-jdbc'
    // New Maven coordinates since Spring Boot 3 — version managed by BOM
    runtimeOnly    'com.mysql:mysql-connector-j'

    // --- Lombok (compile-time only) ---
    compileOnly         'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // --- Testing ---
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'io.projectreactor:reactor-test'
    // Boot 4 modular test starters — needed for slice tests
    testImplementation 'org.springframework.boot:spring-boot-starter-webflux-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-jdbc-test'
}

// ---------------------------------------------------------------------------
// Test
// ---------------------------------------------------------------------------
tasks.named('test') {
    useJUnitPlatform()
    // Surface JVM warnings in test output — useful with JDK 25 previews
    jvmArgs '--enable-preview'
}

// ---------------------------------------------------------------------------
// Compiler options
// ---------------------------------------------------------------------------
tasks.withType(JavaCompile).configureEach {
    options.release = 25           // --release 25 (replaces sourceCompatibility)
    options.compilerArgs << '--enable-preview'
    options.encoding = 'UTF-8'
}